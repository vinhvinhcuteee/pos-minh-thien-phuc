<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn - CỬA HÀNG MINH THIÊN PHÚC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
        }
        
        .header {
            background: #1f2937;
            color: white;
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 1.1rem;
            text-align: center;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        
        .nav-links a:hover {
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .filter-bar {
            background: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .filter-bar label {
            font-weight: 500;
            color: #4b5563;
        }
        
        .filter-bar select, .filter-bar input {
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        
        .invoices-table {
            background: white;
            border-radius: 8px;
            overflow-x: auto;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        
        th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
        }
        
        tfoot td {
            background: #f9fafb;
            font-weight: bold;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
        
        .logout-btn {
            background: #dc2626;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        
        @media print {
            .header, .filter-bar, .logout-btn, .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HÓA ĐƠN BÁN HÀNG</h1>
        <div class="nav-links">
            <a href="/">BÁN HÀNG</a>
            <a href="/products">SẢN PHẨM</a>
            <a href="/customers">KHÁCH HÀNG</a>
            <a href="/reports">BÁO CÁO</a>
            <a href="/invoices">HÓA ĐƠN</a>
            <a href="/logout" class="logout-btn">ĐĂNG XUẤT</a>
        </div>
    </div>
    
    <div class="container">
        <div class="filter-bar">
            <label>LỌC THEO:</label>
            <select id="filterType" onchange="loadInvoices()">
                <option value="all">TẤT CẢ</option>
                <option value="today">HÔM NAY</option>
                <option value="week">TUẦN NÀY</option>
                <option value="month">THÁNG NÀY</option>
            </select>
            <label>TỪ NGÀY:</label>
            <input type="date" id="startDate" onchange="loadInvoices()">
            <label>ĐẾN NGÀY:</label>
            <input type="date" id="endDate" onchange="loadInvoices()">
            <button onclick="printInvoices()" style="padding:8px 16px; background:#1f2937; color:white; border:none; border-radius:6px; cursor:pointer;">IN HÓA ĐƠN</button>
        </div>
        
        <div class="invoices-table">
            <table id="invoicesTable">
                <thead>
                    <tr>
                        <th>MÃ ĐƠN</th>
                        <th>SẢN PHẨM</th>
                        <th>NGÀY MUA</th>
                        <th>SỐ LƯỢNG</th>
                        <th>ĐƠN GIÁ</th>
                        <th>THÀNH TIỀN</th>
                    </tr>
                </thead>
                <tbody id="invoiceList">
                    <tr><td colspan="6" class="empty-state">Đang tải...</td></tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="5"><strong>TỔNG CỘNG:</strong></td>
                        <td id="totalAmount"><strong>0đ</strong></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
<!-- Tìm phần <th> trong thead và thêm cột THAO TÁC -->
<thead>
    <tr>
        <th>MÃ ĐƠN</th>
        <th>SẢN PHẨM</th>
        <th>NGÀY MUA</th>
        <th>SỐ LƯỢNG</th>
        <th>ĐƠN GIÁ</th>
        <th>THÀNH TIỀN</th>
        <th>THAO TÁC</th>
    </tr>
</thead>

<!-- Sửa lại phần hiển thị dữ liệu trong JavaScript -->
<script>
    async function loadInvoices() {
        const filterType = document.getElementById('filterType').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        
        let url = `/api/invoices?filter=${filterType}`;
        if (startDate) url += `&start_date=${startDate}`;
        if (endDate) url += `&end_date=${endDate}`;
        
        const res = await fetch(url);
        const invoices = await res.json();
        const tbody = document.getElementById('invoiceList');
        const totalSpan = document.getElementById('totalAmount');
        
        if (invoices.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Không có hóa đơn nào</td></tr>';
            totalSpan.innerText = '0đ';
            return;
        }
        
        // Nhóm theo order_number để hiển thị từng dòng sản phẩm
        let totalAll = 0;
        tbody.innerHTML = invoices.map(inv => {
            const subtotal = inv.quantity * inv.price;
            totalAll += subtotal;
            return `
                <tr data-order-number="${escapeHtml(inv.order_number)}">
                    <td>${escapeHtml(inv.order_number)}</td>
                    <td>${escapeHtml(inv.product_name)}</td>
                    <td>${new Date(inv.created_at).toLocaleString('vi-VN')}</td>
                    <td>${inv.quantity}</td>
                    <td>${formatMoney(inv.price)}</td>
                    <td>${formatMoney(subtotal)}</td>
                    <td>
                        <button class="btn-delete-invoice" onclick="deleteInvoice('${escapeHtml(inv.order_number)}')" style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">XÓA</button>
                    </td>
                </tr>
            `;
        }).join('');
        
        totalSpan.innerHTML = `<strong>${formatMoney(totalAll)}</strong>`;
    }
    
    async function deleteInvoice(orderNumber) {
        if (confirm(`Bạn có chắc muốn xóa hóa đơn ${orderNumber}? Hành động này sẽ hoàn lại số lượng tồn kho và không thể khôi phục.`)) {
            const res = await fetch(`/api/invoices/${orderNumber}`, { method: 'DELETE' });
            const result = await res.json();
            
            if (result.success) {
                alert('Xóa hóa đơn thành công!');
                loadInvoices(); // Reload danh sách
                // Cập nhật lại thống kê nếu cần
                if (typeof loadStats === 'function') loadStats();
                if (typeof loadMonthStats === 'function') loadMonthStats();
            } else {
                alert(result.error || 'Xóa thất bại!');
            }
        }
    }
</script>

<!-- Thêm style cho nút xóa -->
<style>
    .btn-delete-invoice:hover {
        background: #dc2626 !important;
    }
</style>
    
    <script>
        async function loadInvoices() {
            const filterType = document.getElementById('filterType').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            let url = `/api/invoices?filter=${filterType}`;
            if (startDate) url += `&start_date=${startDate}`;
            if (endDate) url += `&end_date=${endDate}`;
            
            const res = await fetch(url);
            const invoices = await res.json();
            const tbody = document.getElementById('invoiceList');
            const totalSpan = document.getElementById('totalAmount');
            
            if (invoices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Không có hóa đơn nào</td></tr>';
                totalSpan.innerText = '0đ';
                return;
            }
            
            let totalAll = 0;
            tbody.innerHTML = invoices.map(inv => {
                const subtotal = inv.quantity * inv.price;
                totalAll += subtotal;
                return `
                    <tr>
                        <td>${escapeHtml(inv.order_number)}</td>
                        <td>${escapeHtml(inv.product_name)}</td>
                        <td>${new Date(inv.created_at).toLocaleString('vi-VN')}</td>
                        <td>${inv.quantity}</td>
                        <td>${formatMoney(inv.price)}</td>
                        <td>${formatMoney(subtotal)}</td>
                    </tr>
                `;
            }).join('');
            
            totalSpan.innerHTML = `<strong>${formatMoney(totalAll)}</strong>`;
        }
        
        function printInvoices() {
            window.print();
        }
        
        function formatMoney(amount) {
            return new Intl.NumberFormat('vi-VN').format(amount) + 'đ';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Set default dates
        const today = new Date().toISOString().split('T')[0];
        const firstDay = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
        document.getElementById('startDate').value = firstDay;
        document.getElementById('endDate').value = today;
        
        loadInvoices();
    </script>
</body>
</html>
