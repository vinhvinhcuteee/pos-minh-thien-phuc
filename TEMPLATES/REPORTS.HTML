<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo - CỬA HÀNG MINH THIÊN PHÚC</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
        }
        
        .header {
            background: #1f2937;
            color: white;
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 1.1rem;
            text-align: center;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        
        .nav-links a:hover {
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #6b7280;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1f2937;
        }
        
        .stat-sub {
            font-size: 0.7rem;
            color: #10b981;
            margin-top: 8px;
        }
        
        .chart-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .chart-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 16px;
            color: #1f2937;
        }
        
        .date-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .date-selector button {
            padding: 8px 16px;
            border: 1px solid #e5e7eb;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .date-selector button.active {
            background: #1f2937;
            color: white;
            border-color: #1f2937;
        }
        
        .custom-date {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }
        
        .custom-date input {
            padding: 8px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
        }
        
        .top-products {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .product-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .product-name {
            font-weight: 500;
        }
        
        .product-sold {
            color: #dc2626;
            font-weight: bold;
        }
        
        .profit-highlight {
            color: #10b981;
        }
        
        .loss-highlight {
            color: #dc2626;
        }
        
        .logout-btn {
            background: #dc2626;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>BÁO CÁO THỐNG KÊ</h1>
        <div class="nav-links">
            <a href="/">BÁN HÀNG</a>
            <a href="/products">SẢN PHẨM</a>
            <a href="/customers">KHÁCH HÀNG</a>
            <a href="/reports">BÁO CÁO</a>
            <a href="/invoices">HÓA ĐƠN</a>
            <a href="/logout" class="logout-btn">ĐĂNG XUẤT</a>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-overview" id="statsOverview">
            <div class="stat-card">
                <div class="stat-label">TỔNG SẢN PHẨM</div>
                <div class="stat-value" id="totalProducts">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">TỔNG KHÁCH HÀNG</div>
                <div class="stat-value" id="totalCustomers">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">TỔNG ĐƠN HÀNG</div>
                <div class="stat-value" id="totalOrders">-</div>
            </div>
        </div>
        
        <div class="stats-overview">
            <div class="stat-card">
                <div class="stat-label">DOANH THU HÔM NAY</div>
                <div class="stat-value" id="todayRevenue">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">DOANH THU THÁNG NÀY</div>
                <div class="stat-value" id="monthRevenue">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">LỢI NHUẬN THÁNG NÀY</div>
                <div class="stat-value" id="profit">-</div>
                <div class="stat-sub" id="profitMargin">-</div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">BIỂU ĐỒ DOANH THU</div>
            <div class="date-selector">
                <button onclick="loadReport('day')" id="btnDay">THEO NGÀY</button>
                <button onclick="loadReport('month')" id="btnMonth">THEO THÁNG</button>
                <button onclick="loadReport('year')" id="btnYear">THEO NĂM</button>
            </div>
            <div class="custom-date">
                <input type="date" id="customDate" onchange="loadCustomReport()">
                <button onclick="loadCustomReport()" style="padding:8px 16px; background:#1f2937; color:white; border:none; border-radius:6px;">XEM</button>
            </div>
            <canvas id="revenueChart" style="max-height: 300px; width: 100%; margin-top: 20px;"></canvas>
        </div>
        
        <div class="top-products">
            <div class="chart-title">TOP SẢN PHẨM BÁN CHẠY</div>
            <div id="topProductsList">
                <div>Đang tải...</div>
            </div>
        </div>
    </div>
    
    <script>
        let revenueChart = null;
        let currentReportType = 'day';
        
        async function loadStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            
            document.getElementById('totalProducts').innerText = data.total_products || 0;
            document.getElementById('totalCustomers').innerText = data.total_customers || 0;
            document.getElementById('totalOrders').innerText = data.total_orders || 0;
            document.getElementById('todayRevenue').innerText = formatMoney(data.today_revenue || 0);
            document.getElementById('monthRevenue').innerText = formatMoney(data.month_revenue || 0);
            document.getElementById('profit').innerHTML = formatMoney(data.profit || 0);
            
            const profitMargin = data.profit_margin || 0;
            const marginClass = profitMargin >= 0 ? 'profit-highlight' : 'loss-highlight';
            document.getElementById('profitMargin').innerHTML = `Tỷ suất: <span class="${marginClass}">${profitMargin.toFixed(1)}%</span>`;
            
            if (data.top_products && data.top_products.length > 0) {
                document.getElementById('topProductsList').innerHTML = data.top_products.map(p => `
                    <div class="product-item">
                        <span class="product-name">${escapeHtml(p.name)}</span>
                        <span class="product-sold">Đã bán: ${p.total_sold}</span>
                    </div>
                `).join('');
            } else {
                document.getElementById('topProductsList').innerHTML = '<div class="empty-state">Chưa có dữ liệu</div>';
            }
        }
        
        async function loadReport(type) {
            currentReportType = type;
            
            // Active button
            document.querySelectorAll('.date-selector button').forEach(btn => btn.classList.remove('active'));
            if (type === 'day') document.getElementById('btnDay').classList.add('active');
            if (type === 'month') document.getElementById('btnMonth').classList.add('active');
            if (type === 'year') document.getElementById('btnYear').classList.add('active');
            
            const res = await fetch(`/api/reports/detail?type=${type}`);
            const data = await res.json();
            
            let labels = [];
            let revenues = [];
            
            if (type === 'day') {
                labels = data.map(d => `${d.hour}:00`);
                revenues = data.map(d => d.revenue || 0);
            } else if (type === 'month') {
                labels = data.map(d => {
                    const date = new Date(d.day);
                    return `${date.getDate()}/${date.getMonth() + 1}`;
                });
                revenues = data.map(d => d.revenue || 0);
            } else if (type === 'year') {
                labels = data.map(d => {
                    const date = new Date(d.month);
                    return `${date.getMonth() + 1}/${date.getFullYear()}`;
                });
                revenues = data.map(d => d.revenue || 0);
            }
            
            if (revenueChart) {
                revenueChart.destroy();
            }
            
            const ctx = document.getElementById('revenueChart').getContext('2d');
            revenueChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Doanh thu (VNĐ)',
                        data: revenues,
                        backgroundColor: '#1f2937',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return 'Doanh thu: ' + formatMoney(context.raw);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: {
                                callback: function(value) {
                                    if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
                                    if (value >= 1000) return (value / 1000).toFixed(0) + 'K';
                                    return value;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        async function loadCustomReport() {
            const date = document.getElementById('customDate').value;
            if (!date) return;
            
            const res = await fetch(`/api/reports/detail?type=${currentReportType}&date=${date}`);
            const data = await res.json();
            
            // Similar rendering logic as above
            if (revenueChart) revenueChart.destroy();
            
            let labels = [];
            let revenues = [];
            
            if (currentReportType === 'day') {
                labels = data.map(d => `${d.hour}:00`);
                revenues = data.map(d => d.revenue || 0);
            } else if (currentReportType === 'month') {
                labels = data.map(d => {
                    const date = new Date(d.day);
                    return `${date.getDate()}/${date.getMonth() + 1}`;
                });
                revenues = data.map(d => d.revenue || 0);
            } else {
                labels = data.map(d => {
                    const date = new Date(d.month);
                    return `${date.getMonth() + 1}/${date.getFullYear()}`;
                });
                revenues = data.map(d => d.revenue || 0);
            }
            
            const ctx = document.getElementById('revenueChart').getContext('2d');
            revenueChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Doanh thu (VNĐ)',
                        data: revenues,
                        backgroundColor: '#1f2937',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return 'Doanh thu: ' + formatMoney(context.raw);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: {
                                callback: function(value) {
                                    if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
                                    if (value >= 1000) return (value / 1000).toFixed(0) + 'K';
                                    return value;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        function formatMoney(amount) {
            return new Intl.NumberFormat('vi-VN').format(amount) + 'đ';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Set default date
        document.getElementById('customDate').value = new Date().toISOString().split('T')[0];
        
        loadStats();
        loadReport('day');
    </script>
</body>
</html>
